name: Flutter Build

on:
  push:
    branches: [ main, master, feat/russian-translation ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.0'
          channel: 'stable'
          cache: true

      - name: Check Flutter version
        run: flutter --version

      - name: Check Dart version
        run: dart --version

      - name: Get dependencies
        run: flutter pub get

      - name: Run Flutter analyze
        run: flutter analyze

      - name: Run Flutter tests
        run: flutter test || echo "No tests found, skipping..."

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Build Release APK
        run: flutter build apk --release
        continue-on-error: true

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          path: |
            build/app/outputs/flutter-apk/*.apk
          retention-days: 14

      - name: Build Summary
        run: |
          echo "## 📦 Сборка завершена!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Flutter: $(flutter --version | head -1)" >> $GITHUB_STEP_SUMMARY
          echo "✅ Dart: $(dart --version)" >> $GITHUB_STEP_SUMMARY
          echo "✅ Дата: $(date)" >> $GITHUB_STEP_SUMMARY
